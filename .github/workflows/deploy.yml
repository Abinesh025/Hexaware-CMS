name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  backend-test:
    name: Backend Test Suite
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Server Dependencies
        run: |
          cd server
          npm ci

      - name: Run Backend Tests
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/college-test
          JWT_SECRET: test_jwt_secret_must_be_long_enough_to_pass_validation
        run: |
          cd server
          npm test

  frontend-build:
    name: Frontend Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Client Dependencies
        run: |
          cd client
          npm ci

      - name: Build Frontend Application
        run: |
          cd client
          npm run build
